name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v6
      - name: Require matching versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const packageVersion = require("./package.json").version;
          const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
          const cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargo.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const tagVersion = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          const versions = { packageVersion, tauriVersion, cargoVersion, tagVersion };
          if (!/^\d+\.\d+\.\d+$/.test(tagVersion)) {
            console.error(`Tag ${process.env.GITHUB_REF_NAME} is not in vMAJOR.MINOR.PATCH form.`);
            process.exit(1);
          }
          if (new Set(Object.values(versions)).size !== 1) {
            console.error("Version mismatch:", versions);
            process.exit(1);
          }
          console.log(`Validated version ${tagVersion}`);
          NODE
      - name: Create or reuse draft release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" --jq .id 2>/dev/null || true)"
          if [ -z "$release_id" ]; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft --generate-notes --title "Remind Me $GITHUB_REF_NAME"
            release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" --jq .id)"
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: validate-version
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}
          cache-on-failure: true
      - name: Install frontend dependencies
        run: npm ci
      - name: Build and upload signed installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.validate-version.outputs.release_id }}
          uploadUpdaterJson: false
          retryAttempts: 3
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}

  assemble-and-publish:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y
      - name: Download native installers
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force universal-input | Out-Null
          gh release download $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --pattern "Remind.Me_*_x64-setup.exe" --dir universal-input
          gh release download $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --pattern "Remind.Me_*_arm64-setup.exe" --dir universal-input
          gh release download $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --pattern "Remind.Me_*_x64-setup.exe.sig" --dir universal-input
          gh release download $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --pattern "Remind.Me_*_arm64-setup.exe.sig" --dir universal-input
      - name: Assemble and validate updater manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:GITHUB_REF_NAME" | ConvertFrom-Json
          $x64Installer = @(Get-ChildItem universal-input -Filter "*_x64-setup.exe" -File)
          $arm64Installer = @(Get-ChildItem universal-input -Filter "*_arm64-setup.exe" -File)
          $x64Signature = @(Get-ChildItem universal-input -Filter "*_x64-setup.exe.sig" -File)
          $arm64Signature = @(Get-ChildItem universal-input -Filter "*_arm64-setup.exe.sig" -File)
          if ($x64Installer.Count -ne 1 -or $arm64Installer.Count -ne 1 -or $x64Signature.Count -ne 1 -or $arm64Signature.Count -ne 1) {
            throw "Expected exactly one installer and signature for each Windows architecture"
          }

          function Get-AssetUrl([string]$name) {
            $asset = @($release.assets | Where-Object name -eq $name)
            if ($asset.Count -ne 1) { throw "Release asset is missing or ambiguous: $name" }
            return "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/assets/$($asset[0].id)"
          }

          $x64 = [ordered]@{
            signature = (Get-Content -Raw $x64Signature[0].FullName).Trim()
            url = Get-AssetUrl $x64Installer[0].Name
          }
          $arm64 = [ordered]@{
            signature = (Get-Content -Raw $arm64Signature[0].FullName).Trim()
            url = Get-AssetUrl $arm64Installer[0].Name
          }
          $manifest = [ordered]@{
            version = $env:GITHUB_REF_NAME.TrimStart("v")
            notes = [string]$release.body
            pub_date = [DateTime]::UtcNow.ToString("o")
            platforms = [ordered]@{
              "windows-x86_64" = $x64
              "windows-x86_64-nsis" = $x64
              "windows-aarch64" = $arm64
              "windows-aarch64-nsis" = $arm64
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 latest.json
          $validated = Get-Content -Raw latest.json | ConvertFrom-Json
          if (-not $validated.platforms."windows-x86_64-nsis" -or -not $validated.platforms."windows-aarch64-nsis") {
            throw "Updater manifest does not contain both NSIS architectures"
          }
      - name: Build universal installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $x64 = (Get-ChildItem universal-input -Filter "*_x64-setup.exe" -File).FullName
          $arm64 = (Get-ChildItem universal-input -Filter "*_arm64-setup.exe" -File).FullName
          $output = Join-Path $env:GITHUB_WORKSPACE "Remind.Me-setup.exe"
          $icon = Join-Path $env:GITHUB_WORKSPACE "src-tauri\icons\icon.ico"
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" "/DVERSION=$version" "/DX64_INSTALLER=$x64" "/DARM64_INSTALLER=$arm64" "/DOUTPUT_FILE=$output" "/DICON_FILE=$icon" installer\universal.nsi
          if ($LASTEXITCODE -ne 0) { throw "Universal installer compilation failed" }
      - name: Upload universal installer and publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload $env:GITHUB_REF_NAME Remind.Me-setup.exe latest.json --repo $env:GITHUB_REPOSITORY --clobber
          gh release edit $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --draft=false --latest
