name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Require matching versions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const packageVersion = require("./package.json").version;
          const tauriVersion = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version;
          const cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargo.match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const tagVersion = process.env.GITHUB_REF_NAME.replace(/^v/, "");
          const versions = { packageVersion, tauriVersion, cargoVersion, tagVersion };
          if (!/^\d+\.\d+\.\d+$/.test(tagVersion)) {
            console.error(`Tag ${process.env.GITHUB_REF_NAME} is not in vMAJOR.MINOR.PATCH form.`);
            process.exit(1);
          }
          if (new Set(Object.values(versions)).size !== 1) {
            console.error("Version mismatch:", versions);
            process.exit(1);
          }
          console.log(`Validated version ${tagVersion}`);
          NODE

  build-windows:
    needs: validate-version
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install frontend dependencies
        run: npm ci
      - name: Build and upload signed installers
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Remind Me v__VERSION__
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}

  assemble-and-publish:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y
      - name: Download native installers
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force universal-input | Out-Null
          gh release download $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --pattern "Remind.Me_*_x64-setup.exe" --dir universal-input
          gh release download $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --pattern "Remind.Me_*_arm64-setup.exe" --dir universal-input
      - name: Build universal installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $x64 = (Get-ChildItem universal-input -Filter "*_x64-setup.exe" -File).FullName
          $arm64 = (Get-ChildItem universal-input -Filter "*_arm64-setup.exe" -File).FullName
          $output = Join-Path $env:GITHUB_WORKSPACE "Remind.Me-setup.exe"
          $icon = Join-Path $env:GITHUB_WORKSPACE "src-tauri\icons\icon.ico"
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" "/DVERSION=$version" "/DX64_INSTALLER=$x64" "/DARM64_INSTALLER=$arm64" "/DOUTPUT_FILE=$output" "/DICON_FILE=$icon" installer\universal.nsi
          if ($LASTEXITCODE -ne 0) { throw "Universal installer compilation failed" }
      - name: Upload universal installer and publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload $env:GITHUB_REF_NAME Remind.Me-setup.exe --repo $env:GITHUB_REPOSITORY --clobber
          gh release edit $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --draft=false --latest
